<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Footy Inform — Club, National Team &amp; Transfer News</title>
<meta name="description" content="Footy Inform — fast, no-nonsense football coverage: club news, national team news, and transfer gossip.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --pitch-dark:#0E2A1B;
    --pitch:#163B26;
    --pitch-light:#1F4F32;
    --chalk:#F4F2E9;
    --chalk-dim:#C9D3C6;
    --ink:#0F2016;
    --ink-dim:#4B5D51;
    --floodlight:#FFB627;
    --floodlight-dim:#8A6420;
    --line:rgba(244,242,233,0.12);
    --card-bg:#F4F2E9;
    --good:#3F9D63;
    --warn:#E0A012;
    --bad:#D8452D;
    --radius:2px;
    --display:'Oswald',sans-serif;
    --body:'Inter',sans-serif;
    --mono:'Space Mono',monospace;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--pitch-dark);
    color:var(--chalk);
    font-family:var(--body);
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,h4,.display{font-family:var(--display);text-transform:uppercase;letter-spacing:.02em;}
  a{color:inherit;text-decoration:none;}
  button{font-family:inherit;cursor:pointer;}
  ::selection{background:var(--floodlight);color:var(--ink);}

  .topbar{
    position:sticky;top:0;z-index:40;
    display:flex;align-items:center;gap:14px;
    padding:14px 20px;
    background:var(--pitch-dark);
    border-bottom:1px solid var(--line);
  }
  .hamburger{
    width:38px;height:34px;
    background:transparent;border:1px solid var(--line);
    border-radius:var(--radius);
    display:flex;flex-direction:column;justify-content:center;align-items:center;gap:5px;
    transition:border-color .2s, background .2s;
  }
  .hamburger:hover{border-color:var(--floodlight);}
  .hamburger span{width:18px;height:2px;background:var(--chalk);display:block;transition:transform .25s, opacity .2s;}
  .hamburger.active span:nth-child(1){transform:translateY(7px) rotate(45deg);}
  .hamburger.active span:nth-child(2){opacity:0;}
  .hamburger.active span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}

  .brand{display:flex;align-items:baseline;gap:8px;flex:1;}
  .brand .mark{
    font-family:var(--display);font-weight:700;font-size:22px;letter-spacing:.03em;color:var(--chalk);
    text-transform:uppercase;
  }
  .brand .mark em{
    font-style:normal;color:var(--floodlight);
  }
  .brand .tagline{
    font-family:var(--mono);font-size:10px;color:var(--chalk-dim);letter-spacing:.08em;
    display:none;
  }
  @media(min-width:640px){.brand .tagline{display:inline;}}

  .write-btn{
    border:1px solid var(--floodlight-dim);
    color:var(--floodlight);
    background:transparent;
    padding:8px 14px;
    font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;
    border-radius:var(--radius);
    transition:background .2s,color .2s;
  }
  .write-btn:hover{background:var(--floodlight);color:var(--ink);}

  .ticker{
    background:var(--pitch);
    border-bottom:1px solid var(--line);
    overflow:hidden;
    white-space:nowrap;
    position:relative;
  }
  .ticker::before{
    content:'LIVE';
    position:absolute;left:0;top:0;bottom:0;z-index:2;
    display:flex;align-items:center;
    padding:0 12px;
    background:var(--bad);
    font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--chalk);
  }
  .ticker-track{
    display:inline-block;
    padding-left:100%;
    animation:scroll-ticker 32s linear infinite;
    font-family:var(--mono);font-size:12px;color:var(--floodlight);
    padding-top:7px;padding-bottom:7px;
  }
  .ticker-track span{margin-right:40px;color:var(--chalk-dim);}
  .ticker-track span b{color:var(--floodlight);font-weight:700;}
  @keyframes scroll-ticker{from{transform:translateX(0);}to{transform:translateX(-100%);}}
  @media(prefers-reduced-motion:reduce){.ticker-track{animation:none;padding-left:64px;}}

  #overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.5);
    z-index:45;opacity:0;pointer-events:none;transition:opacity .25s;
  }
  #overlay.show{opacity:1;pointer-events:auto;}

  .sidebar{
    position:fixed;top:0;left:0;bottom:0;
    width:280px;
    background:var(--pitch);
    border-right:1px solid var(--line);
    transform:translateX(-100%);
    transition:transform .28s ease;
    z-index:50;
    display:flex;flex-direction:column;
    padding:20px 0;
  }
  .sidebar.open{transform:translateX(0);}
  .sidebar-head{
    display:flex;justify-content:space-between;align-items:center;
    padding:0 20px 18px;border-bottom:1px solid var(--line);margin-bottom:8px;
  }
  .sidebar-head .display{font-size:15px;color:var(--chalk-dim);}
  .sidebar-close{background:none;border:none;color:var(--chalk-dim);font-size:20px;line-height:1;}
  .sidebar-close:hover{color:var(--floodlight);}

  .nav-section-label{
    font-family:var(--mono);font-size:10px;letter-spacing:.12em;color:var(--chalk-dim);
    padding:14px 20px 6px;text-transform:uppercase;
  }
  .nav-item{
    display:flex;align-items:center;gap:12px;
    padding:13px 20px;
    border-left:3px solid transparent;
    color:var(--chalk-dim);
    font-family:var(--display);font-size:15px;letter-spacing:.02em;
    transition:background .2s,color .2s,border-color .2s;
  }
  .nav-item:hover{background:var(--pitch-light);color:var(--chalk);}
  .nav-item.active{
    color:var(--chalk);background:var(--pitch-light);
    border-left-color:var(--floodlight);
  }
  .nav-item .ico{width:18px;height:18px;flex:none;opacity:.85;}
  .nav-item .count{
    margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--floodlight);
  }
  .nav-item.disabled{opacity:.4;cursor:default;}
  .nav-item.disabled:hover{background:transparent;color:var(--chalk-dim);}
  .nav-more{
    margin:14px 20px 0;padding:12px 14px;
    border:1px dashed var(--line);border-radius:var(--radius);
    font-family:var(--mono);font-size:10px;color:var(--chalk-dim);line-height:1.5;
  }
  .sidebar-write{
    margin:auto 20px 4px;
    padding:12px 14px;
    border:1px solid var(--floodlight-dim);border-radius:var(--radius);
    color:var(--floodlight);font-family:var(--mono);font-size:11px;text-align:center;
    letter-spacing:.05em;text-transform:uppercase;
  }
  .sidebar-write:hover{background:var(--floodlight);color:var(--ink);}

  main{max-width:760px;margin:0 auto;padding:26px 18px 60px;}

  .view-tabs{
    display:flex;gap:0;
    border-bottom:1px solid var(--line);
    margin-bottom:22px;
  }
  .view-tab{
    background:none;border:none;
    padding:10px 4px;margin-right:26px;
    font-family:var(--display);font-size:16px;letter-spacing:.02em;
    color:var(--chalk-dim);
    border-bottom:2px solid transparent;
    position:relative;top:1px;
  }
  .view-tab.active{color:var(--chalk);border-bottom-color:var(--floodlight);}
  .filter-note{
    font-family:var(--mono);font-size:11px;color:var(--chalk-dim);margin:-14px 0 20px;
  }
  .filter-note button{background:none;border:none;color:var(--floodlight);font-family:var(--mono);font-size:11px;text-decoration:underline;padding:0;}

  .card{
    display:block;background:var(--card-bg);color:var(--ink);
    border-radius:var(--radius);overflow:hidden;
    margin-bottom:22px;
    border:1px solid rgba(0,0,0,.06);
    transition:transform .18s, box-shadow .18s;
  }
  .card:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(0,0,0,.35);}
  .card-img{width:100%;height:190px;object-fit:cover;display:block;background:var(--pitch-light);}
  .card-body{padding:16px 18px 18px;}
  .card-meta{
    display:flex;align-items:center;gap:10px;margin-bottom:8px;
    font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;
  }
  .tag{
    padding:3px 8px;border-radius:2px;color:#fff;font-weight:700;
  }
  .tag.club{background:#1F4F32;}
  .tag.national{background:#7A4A16;}
  .tag.transfers{background:#7A2E1F;}
  .card-meta .dot{color:var(--ink-dim);}
  .card-meta .trending-flag{color:var(--bad);font-weight:700;}
  .card h3{font-size:21px;margin:0 0 8px;line-height:1.18;}
  .card p.snippet{margin:0;color:var(--ink-dim);font-size:14.5px;line-height:1.55;}
  .read-more{display:inline-block;margin-top:10px;font-family:var(--mono);font-size:11px;color:#1F4F32;text-decoration:underline;}

  .empty-state{
    padding:50px 20px;text-align:center;color:var(--chalk-dim);
    border:1px dashed var(--line);border-radius:var(--radius);
    font-family:var(--mono);font-size:12px;
  }

  .back-btn{
    display:inline-flex;align-items:center;gap:6px;
    background:none;border:1px solid var(--line);color:var(--chalk-dim);
    padding:7px 12px;font-family:var(--mono);font-size:11px;border-radius:var(--radius);
    margin-bottom:20px;
  }
  .back-btn:hover{border-color:var(--floodlight);color:var(--floodlight);}
  .article-hero{width:100%;height:260px;object-fit:cover;border-radius:var(--radius);margin-bottom:18px;}
  .article-meta{font-family:var(--mono);font-size:11px;color:var(--chalk-dim);margin-bottom:8px;display:flex;gap:10px;align-items:center;}
  .article h1{font-size:32px;line-height:1.1;margin:0 0 16px;}
  .article-body{font-size:16px;line-height:1.75;color:var(--chalk);}
  .article-body p{margin:0 0 18px;}
  .article-body h2{font-family:var(--display);font-size:20px;margin:26px 0 12px;color:var(--floodlight);}

  .writer h2.display{font-size:24px;margin-bottom:4px;}
  .writer .sub{color:var(--chalk-dim);font-size:13px;margin-bottom:22px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--chalk-dim);margin-bottom:6px;}
  .field input,.field textarea,.field select{
    width:100%;background:var(--pitch);border:1px solid var(--line);color:var(--chalk);
    padding:10px 12px;font-family:var(--body);font-size:14px;border-radius:var(--radius);
  }
  .field textarea{resize:vertical;min-height:70px;line-height:1.5;}
  .field-row{display:flex;gap:14px;}
  .field-row .field{flex:1;}
  .char-count{font-family:var(--mono);font-size:10px;color:var(--chalk-dim);margin-top:4px;text-align:right;}

  .seo-panel{
    background:var(--pitch);border:1px solid var(--line);border-radius:var(--radius);
    padding:18px;margin:22px 0;
  }
  .seo-score-row{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
  .seo-score-circle{
    width:52px;height:52px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-weight:700;font-size:16px;
    border:3px solid var(--line);flex:none;
  }
  .seo-score-label{font-family:var(--display);font-size:15px;letter-spacing:.02em;}
  .seo-score-label span{display:block;font-family:var(--mono);font-size:10px;color:var(--chalk-dim);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}
  .seo-checks{list-style:none;margin:0;padding:0;}
  .seo-checks li{
    display:flex;align-items:flex-start;gap:10px;
    padding:8px 0;border-top:1px solid var(--line);
    font-size:13px;color:var(--chalk-dim);
  }
  .seo-checks li:first-child{border-top:none;}
  .seo-dot{width:9px;height:9px;border-radius:50%;flex:none;margin-top:4px;}
  .seo-checks li b{color:var(--chalk);}

  .publish-btn{
    background:var(--floodlight);color:var(--ink);border:none;
    padding:12px 22px;font-family:var(--display);font-size:15px;letter-spacing:.03em;
    border-radius:var(--radius);
  }
  .publish-btn:hover{background:#ffc95c;}
  .publish-btn:disabled{opacity:.4;cursor:not-allowed;}
  .cancel-btn{
    background:none;border:1px solid var(--line);color:var(--chalk-dim);
    padding:12px 18px;font-family:var(--mono);font-size:12px;border-radius:var(--radius);margin-left:10px;
  }

  footer{
    border-top:1px solid var(--line);
    padding:26px 20px 40px;
    text-align:center;
    font-family:var(--mono);font-size:11px;color:var(--chalk-dim);
  }
  footer a{color:var(--floodlight);}

  .comp-pills{
    display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;margin-bottom:6px;
  }
  .comp-pill{
    flex:none;background:var(--pitch);border:1px solid var(--line);color:var(--chalk-dim);
    font-family:var(--mono);font-size:10.5px;letter-spacing:.03em;
    padding:8px 13px;border-radius:20px;white-space:nowrap;
    transition:background .2s,color .2s,border-color .2s;
  }
  .comp-pill:hover{background:var(--pitch-light);color:var(--chalk);}
  .comp-pill.active{background:var(--floodlight);color:var(--ink);border-color:var(--floodlight);font-weight:700;}
  .comp-pill .live-count{background:var(--bad);color:#fff;border-radius:8px;padding:1px 6px;font-size:9px;margin-left:6px;}

  .results-subnav{display:flex;gap:18px;border-bottom:1px solid var(--line);margin-bottom:16px;}
  .subtab{
    background:none;border:none;color:var(--chalk-dim);
    font-family:var(--display);font-size:14px;letter-spacing:.02em;
    padding:8px 2px;border-bottom:2px solid transparent;position:relative;top:1px;
    transition:color .2s,border-color .2s;
  }
  .subtab:hover{color:var(--chalk);}
  .subtab.active{color:var(--chalk);border-bottom-color:var(--floodlight);}
  .subtab[hidden]{display:none;}

  .match-day-label{
    font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;
    color:var(--chalk-dim);margin:18px 0 8px;
  }
  .match-day-label:first-child{margin-top:0;}
  .match-row{
    display:flex;align-items:center;gap:10px;
    background:var(--card-bg);color:var(--ink);
    border-radius:var(--radius);padding:10px 14px;margin-bottom:6px;
    font-size:13.5px;
  }
  .match-row.is-live{border-left:3px solid var(--bad);}
  .match-row .m-team{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .match-row .m-team.away{text-align:right;}
  .match-row .m-score{
    font-family:var(--mono);font-weight:700;min-width:54px;text-align:center;
    color:var(--ink);background:#e8e5d9;border-radius:3px;padding:3px 0;
  }
  .match-row.is-live .m-score{background:var(--bad);color:#fff;}
  .m-status{
    font-family:var(--mono);font-size:9px;color:var(--ink-dim);min-width:44px;text-align:center;
  }
  .m-status.live-status{color:var(--bad);font-weight:700;}

  .standings-table{width:100%;border-collapse:collapse;font-size:13px;background:var(--card-bg);color:var(--ink);border-radius:var(--radius);overflow:hidden;}
  .standings-table th{
    font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.05em;
    text-align:left;padding:9px 8px;background:#e8e5d9;color:var(--ink-dim);
  }
  .standings-table td{padding:8px;border-top:1px solid rgba(0,0,0,.06);}
  .standings-table td.num,.standings-table th.num{text-align:center;width:34px;}
  .standings-table td.team{font-weight:600;}
  .standings-table tr:nth-child(1) td.team{color:#1F4F32;}
  .standings-table tr:nth-child(2) td.team{color:#1F4F32;}
  .standings-table tr:nth-child(3) td.team{color:#1F4F32;}
  .standings-table tr:nth-last-child(1) td.team{color:var(--bad);}
  .standings-table tr:nth-last-child(2) td.team{color:var(--bad);}
  .standings-table tr:nth-last-child(3) td.team{color:var(--bad);}

  .scoreboard-empty{
    font-family:var(--mono);font-size:11px;color:var(--chalk-dim);
    border:1px dashed var(--line);border-radius:var(--radius);padding:14px;
  }

  .admin-panel{
    position:fixed;top:64px;right:16px;z-index:60;
    background:var(--pitch);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px;width:220px;box-shadow:0 14px 34px rgba(0,0,0,.45);
  }

  [hidden]{display:none !important;}

  @media(max-width:480px){
    .topbar{padding:10px 12px;gap:10px;}
    .brand .mark{font-size:17px;}
    #modeBadge{display:none;}
    .write-btn{padding:7px 10px;font-size:10px;}
    main{padding:18px 12px 50px;}
    .card-img{height:150px;}
    .card-body{padding:13px 14px 15px;}
    .card h3{font-size:18px;}
    .view-tab{font-size:14px;margin-right:18px;}
    .article h1{font-size:24px;}
    .article-hero{height:180px;}
    .field-row{flex-direction:column;gap:0;}
    .sidebar{width:82%;max-width:280px;}
    .match-row{font-size:12px;padding:9px 10px;gap:6px;}
    .m-status{min-width:34px;}
    .standings-table{font-size:11.5px;}
    .standings-table th,.standings-table td{padding:6px 5px;}
  }
  @media(min-width:481px) and (max-width:767px){
    .card-img{height:170px;}
  }

  a:focus-visible,button:focus-visible,input:focus-visible,textarea:focus-visible{
    outline:2px solid var(--floodlight);outline-offset:2px;
  }

  .loading-spinner{
    display:flex;align-items:center;justify-content:center;padding:30px 0;
    color:var(--chalk-dim);font-family:var(--mono);font-size:12px;
  }
  .loading-spinner::after{
    content:'';display:inline-block;width:20px;height:20px;
    margin-left:12px;border:3px solid var(--line);
    border-top-color:var(--floodlight);border-radius:50%;
    animation:spin .7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  .api-key-notice{
    background:var(--pitch);border:1px solid var(--good);border-radius:var(--radius);
    padding:12px 16px;margin-bottom:16px;font-size:13px;color:var(--chalk-dim);
  }
  .api-key-notice .status-ok{color:var(--good);font-weight:700;}
  .api-key-notice .status-error{color:var(--bad);font-weight:700;}
  .api-key-notice code{
    background:var(--pitch-dark);padding:2px 8px;border-radius:3px;
    font-family:var(--mono);font-size:12px;color:var(--floodlight);
  }
</style>
</head>
<body>

<div id="overlay"></div>

<header class="topbar">
  <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
  <div class="brand">
    <span class="mark" id="brandMark">Footy <em>Inform</em></span>
    <span class="tagline">CLUB · NATIONAL TEAM · TRANSFERS</span>
  </div>
  <span id="modeBadge" style="font-family:var(--mono);font-size:9px;letter-spacing:.06em;color:var(--chalk-dim);border:1px solid var(--line);padding:5px 8px;border-radius:2px;text-transform:uppercase;"></span>
  <button class="write-btn" id="adminBtn">Admin</button>
  <button class="write-btn" id="openWriter" hidden>+ New Post</button>
</header>

<div class="ticker">
  <div class="ticker-track" id="tickerTrack"></div>
</div>

<nav class="sidebar" id="sidebar" aria-label="Categories">
  <div class="sidebar-head">
    <span class="display">Menu</span>
    <button class="sidebar-close" id="sidebarClose" aria-label="Close menu">&times;</button>
  </div>

  <div class="nav-section-label">Categories</div>
  <a href="#" class="nav-item" data-cat="all">
    <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    All Stories
  </a>
  <a href="#" class="nav-item" data-cat="club">
    <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M12 3v18M3 12h18"/></svg>
    Club Football News
  </a>
  <a href="#" class="nav-item" data-cat="national">
    <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M5 3v18M5 4h13l-2.5 3L18 10H5"/></svg>
    National Team News
  </a>
  <a href="#" class="nav-item" data-cat="transfers">
    <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M7 7h10M7 7l3-3M7 7l3 3M17 17H7M17 17l-3-3M17 17l-3 3"/></svg>
